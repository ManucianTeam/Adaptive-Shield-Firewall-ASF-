<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filter phát sáng Neon -->
    <filter id="neon_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradient cho các Nodes -->
    <linearGradient id="node_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E" />
      <stop offset="100%" stop-color="#7B1FA2" />
    </linearGradient>

    <!-- Hiệu ứng hạt dữ liệu (Clean) -->
    <circle id="p_clean" r="2.5" fill="#FFB300" filter="url(#neon_glow)" />
    
    <!-- Hiệu ứng hạt dữ liệu (Anomalous) -->
    <circle id="p_threat" r="3.5" fill="#FF1744" filter="url(#neon_glow)" />
  </defs>

  <!-- Nền tối sâu thẳm -->
  <rect width="800" height="400" rx="12" fill="#02040A" />

  <!-- Grid nền mờ (Cyber Grid) -->
  <path d="M0 200 H800 M400 0 V400" stroke="#1A237E" stroke-opacity="0.1" />

  <!-- Tầng 1: Ingress & Entropy Analysis -->
  <g transform="translate(60, 150)">
    <rect width="100" height="100" rx="6" fill="#0A0E14" stroke="#1A237E" stroke-width="1.5" />
    <text x="50" y="55" text-anchor="middle" fill="#5C6BC0" font-family="monospace" font-size="10">INGRESS</text>
    <path d="M20 75 H80" stroke="#1A237E" stroke-opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Tầng 2: Neural Core (Lõi trí tuệ ASF) -->
  <g transform="translate(400, 200)">
    <!-- Vòng xoay entropy -->
    <circle r="75" stroke="#7B1FA2" stroke-width="0.5" stroke-dasharray="10 5" stroke-opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <!-- Lõi chính -->
    <circle r="50" fill="#0A0E14" stroke="#7B1FA2" stroke-width="3" filter="url(#neon_glow)">
      <animate attributeName="stroke-width" values="2;5;2" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <text text-anchor="middle" dy=".3em" fill="#F3F4F6" font-family="monospace" font-size="12" font-weight="bold">ASF_CORE</text>
  </g>

  <!-- Tầng 3: Distributed Clusters -->
  <g transform="translate(640, 50)">
    <rect width="100" height="40" rx="4" fill="#0A0E14" stroke="#10B981" stroke-width="1.5" />
    <text x="50" y="25" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="9">NODE_01: STABLE</text>
  </g>
  
  <g transform="translate(640, 180)">
    <rect width="100" height="40" rx="4" fill="#0A0E14" stroke="#10B981" stroke-width="1.5" />
    <text x="50" y="25" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="9">NODE_02: STABLE</text>
  </g>

  <g transform="translate(640, 310)">
    <rect width="100" height="40" rx="4" fill="#0A0E14" stroke="#FF1744" stroke-width="1" stroke-dasharray="3 3" />
    <text x="50" y="25" text-anchor="middle" fill="#FF1744" font-family="monospace" font-size="9">QUARANTINE</text>
  </g>

  <!-- Dòng chảy dữ liệu (Animations) -->
  
  <!-- Luồng sạch 1 (Lên Node 01) -->
  <use href="#p_clean">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M160 200 C300 200, 300 200, 400 200 C500 200, 550 70, 640 70" />
  </use>
  
  <!-- Luồng sạch 2 (Vào Node 02) -->
  <use href="#p_clean">
    <animateMotion dur="3.5s" begin="1.2s" repeatCount="indefinite" path="M160 200 C300 200, 300 200, 400 200 H640" />
  </use>

  <!-- Luồng mã độc bị đánh chặn (Vào Quarantine) -->
  <use href="#p_threat">
    <animateMotion dur="2s" begin="0.5s" repeatCount="indefinite" path="M160 200 C300 200, 350 200, 400 200 C450 200, 550 330, 640 330" />
    <animate attributeName="opacity" values="1;1;0" dur="2s" repeatCount="indefinite" />
    <animate attributeName="r" values="3.5;6;2" dur="2s" repeatCount="indefinite" />
  </use>

  <!-- Telemetry Scanline -->
  <rect width="2" height="400" fill="#7B1FA2" fill-opacity="0.2">
    <animate attributeName="x" values="0;800;0" dur="8s" repeatCount="indefinite" />
  </rect>

  <!-- Risk Score Status -->
  <text x="400" y="340" text-anchor="middle" fill="#FFB300" font-family="monospace" font-size="10" letter-spacing="2">
    ANALYZING ENTROPY DRIFT...
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
  </text>
</svg>
