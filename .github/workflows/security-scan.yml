# .github/workflows/security-scan.yml

# =============================================================================
# ASF Security Scan Pipeline
# =============================================================================
#
# File:
#   .github/workflows/security-scan.yml
#
# Purpose:
#   Enterprise-grade security scanning workflow for the
#   Adaptive Shield Firewall (ASF) ecosystem.
#
# Coverage:
#   - Filesystem vulnerability scanning
#   - Dependency analysis
#   - Secret detection
#   - SARIF security reporting
#   - GitHub Security integration
#
# Security Stack:
#   - Trivy
#   - GitHub Code Scanning
#
# Notes:
#   - Blocks CI on HIGH/CRITICAL vulnerabilities
#   - Uploads SARIF reports to GitHub Security tab
#   - Designed for DevSecOps-first workflows
#
# =============================================================================

name: ASF Security Scan

# =============================================================================
# Workflow Triggers
# =============================================================================

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

# =============================================================================
# Jobs
# =============================================================================

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan

    runs-on: ubuntu-latest

    # =========================================================================
    # GitHub Token Permissions
    # =========================================================================

    permissions:
      contents: read
      security-events: write

    # =========================================================================
    # Steps
    # =========================================================================

    steps:
      # =======================================================================
      # Checkout Repository
      # =======================================================================

      - name: Checkout source code
        uses: actions/checkout@v4

      # =======================================================================
      # Setup Node.js Runtime
      # =======================================================================

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 22

      # =======================================================================
      # Install Project Dependencies
      # =======================================================================

      - name: Install dependencies
        run: npm install

      # =======================================================================
      # Trivy Filesystem Scan
      # =======================================================================
      #
      # Scan Types:
      #   - Dependency vulnerabilities
      #   - Secret exposure
      #   - Misconfigurations
      #
      # Severity Threshold:
      #   HIGH + CRITICAL
      #
      # Behavior:
      #   - Fails pipeline on detected vulnerabilities
      #
      # =======================================================================

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0

        with:
          scan-type: fs
          scan-ref: .

          format: table

          severity: CRITICAL,HIGH

          exit-code: 1

          ignore-unfixed: true

      # =======================================================================
      # Generate SARIF Report
      # =======================================================================
      #
      # SARIF allows GitHub Advanced Security integration
      # and native vulnerability visualization.
      #
      # =======================================================================

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.35.0

        with:
          scan-type: fs
          scan-ref: .

          format: sarif

          output: trivy-results.sarif

      # =======================================================================
      # Upload SARIF To GitHub Security
      # =======================================================================
      #
      # Results appear in:
      #   Repository
      #   → Security
      #   → Code scanning alerts
      #
      # =======================================================================

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

# =============================================================================
# End Of Workflow
# =============================================================================
