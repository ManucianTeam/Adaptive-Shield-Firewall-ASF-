# - Removed unstable multi-language autobuild
# - Reduced unsupported language extraction failures
# - Improved CodeQL RAM/thread allocation
# - Hardened CI execution surface
# - Reduced monorepo scan instability
# - Faster SARIF generation
# - Improved GitHub Actions scalability
