# ============================================================
# ASF - Adaptive Shield Firewall
# Ultra-Hardened CodeQL Security Pipeline vNext
# Enterprise / Zero-Trust / High-Performance Edition
# ============================================================

name: "ASF Ultra CodeQL Security Pipeline"

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  schedule:
    - cron: "20 18 * * 1"

  workflow_dispatch:

# ------------------------------------------------------------
# GLOBAL SECURITY SETTINGS
# ------------------------------------------------------------

permissions:
  contents: read
  actions: read
  security-events: write
  packages: read

# ------------------------------------------------------------
# CONCURRENCY CONTROL
# ------------------------------------------------------------

concurrency:
  group: asf-codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ------------------------------------------------------------
# ENVIRONMENT HARDENING
# ------------------------------------------------------------

env:
  NODE_ENV: production
  CI: true
  CODEQL_RAM: 12288
  CODEQL_THREADS: 4

# ============================================================
# CODEQL ANALYSIS JOB
# ============================================================

jobs:
  analyze:
    name: "ASF Security Scan (${{ matrix.language }})"

    runs-on: ubuntu-latest

    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: 3

      matrix:
        include:

          # --------------------------------------------------
          # NestJS / TypeScript Gateway
          # --------------------------------------------------
          - language: javascript-typescript
            build-mode: none

          # --------------------------------------------------
          # AI / ML Services
          # --------------------------------------------------
          - language: python
            build-mode: none

    # --------------------------------------------------------
    # SECURITY CONTAINER HARDENING
    # --------------------------------------------------------

    defaults:
      run:
        shell: bash

    steps:

      # ======================================================
      # SOURCE CHECKOUT
      # ======================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      # ======================================================
      # CODEQL INITIALIZATION
      # ======================================================

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

          queries: |
            security-extended,
            security-and-quality

        env:
          CODEQL_RAM: ${{ env.CODEQL_RAM }}
          CODEQL_THREADS: ${{ env.CODEQL_THREADS }}

      # ======================================================
      # NODE.JS RUNTIME
      # ======================================================

      - name: Setup Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ======================================================
      # PYTHON RUNTIME
      # ======================================================

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ======================================================
      # NPM HARDENING
      # ======================================================

      - name: Harden NPM Environment
        if: matrix.language == 'javascript-typescript'
        run: |
          npm config set audit false
          npm config set fund false
          npm config set progress false

      # ======================================================
      # INSTALL NODE DEPENDENCIES
      # ======================================================

      - name: Install Node Dependencies
        if: matrix.language == 'javascript-typescript'
        run: |
          npm ci --prefer-offline --no-audit || npm install

      # ======================================================
      # INSTALL PYTHON DEPENDENCIES
      # ======================================================

      - name: Install Python Dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ======================================================
      # BUILD TYPESCRIPT SERVICES
      # ======================================================

      - name: Build Gateway Services
        if: matrix.language == 'javascript-typescript'
        run: |
          npm run build --if-present

      # ======================================================
      # CODEQL ANALYSIS
      # ======================================================

      - name: Execute CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      # ======================================================
      # SECURITY ARTIFACT EXPORT
      # ======================================================

      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asf-security-results-${{ matrix.language }}

          retention-days: 7

          path: |
            /home/runner/work/_temp/codeql_databases
            /home/runner/work/_temp/codeql-sarif

      # ======================================================
      # POST-RUN CLEANUP
      # ======================================================

      - name: Secure Cleanup
        if: always()
        run: |
          sudo rm -rf ~/.npm || true
          sudo rm -rf ~/.cache || true
          sudo rm -rf /tmp/* || true
          docker system prune -af || true

# ============================================================
# ASF SECURITY PIPELINE NOTES
# ============================================================
#
