name: ASF CI Pipeline

on:
push:
branches:
- main
- develop

pull_request:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm ci

  - name: Verify NestJS CLI
    run: npx nest --version

  - name: Run Type Check
    run: npm run typecheck --if-present

  - name: Build Project
    run: npm run build

  - name: Run Tests
    run: npm test --if-present
```
