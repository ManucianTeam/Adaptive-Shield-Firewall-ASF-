version: 2

updates:
  # Node.js / TypeScript dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"

    open-pull-requests-limit: 15

    labels:
      - "dependencies"
      - "security"
      - "npm"

    commit-message:
      prefix: "deps"
      include: "scope"

    reviewers:
      - "your-github-username"

    assignees:
      - "your-github-username"

    versioning-strategy: increase

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    labels:
      - "ci"
      - "github-actions"

    commit-message:
      prefix: "ci"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

    labels:
      - "docker"
      - "security"

    commit-message:
      prefix: "docker"

  # Rust Cargo
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Asia/Ho_Chi_Minh"

    open-pull-requests-limit: 10

    labels:
      - "rust"
      - "dependencies"
      - "security"

    commit-message:
      prefix: "cargo"

    versioning-strategy: increase

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
